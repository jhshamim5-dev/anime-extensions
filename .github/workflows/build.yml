name: Build Extensions

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew gradlew.bat

      - name: Build all extensions
        run: |
          for ext in src/*/; do
            module=$(basename "$ext")
            echo "Building $module..."
            ./gradlew ":$module:assembleDebug" --no-daemon --stacktrace 2>&1
          done

      - name: Collect APK artifacts
        run: |
          mkdir -p output
          find . -path "*/build/outputs/apk/**/*.apk" -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-apks
          path: output/*.apk
